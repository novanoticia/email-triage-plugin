name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Dependencias (PyYAML — lo usan los tests de _cargar_config)
        run: pip install --quiet pyyaml

      - name: Tests de triage_helpers (S0-S5 y PASO 0.B)
        run: python3 -m unittest discover -s plugins/email-triage/skills/email-triage/scripts -v

      - name: config.yaml parsea sin trampas YAML 1.1
        run: |
          python3 - <<'EOF'
          import yaml
          cfg = yaml.safe_load(open(
              'plugins/email-triage/skills/email-triage/config.yaml',
              encoding='utf-8'))
          crits = cfg['criterios_epistemicos']
          # 'no:'/'si:' sin comillas se convierten en booleanos en YAML 1.1
          # (regresión del fix de v3.4.1) — las claves deben ser strings.
          bools = [k for k, v in crits.items()
                   if False in v or True in v]
          assert not bools, (
              f"claves booleanas en criterios (¿'no:' sin comillas?): {bools}")
          assert len(crits) == 30, f"se esperaban 30 criterios, hay {len(crits)}"
          print(f"OK: {len(crits)} criterios, 0 claves booleanas")
          EOF

      - name: Coherencia de versiones (plugin.json ↔ marketplace.json ↔ SKILL.md ↔ config)
        run: |
          python3 - <<'PY'
          import json, re, pathlib
          r = pathlib.Path('.')
          def jver(p): return json.loads((r/p).read_text(encoding='utf-8'))['version']
          pj   = jver('.claude-plugin/plugin.json')
          inn  = jver('plugins/email-triage/.claude-plugin/plugin.json')
          mk   = re.search(r'"version"\s*:\s*"([^"]+)"',
                           (r/'.claude-plugin/marketplace.json').read_text(encoding='utf-8')).group(1)
          sk   = re.search(r'(?m)^version:\s*"?([0-9.]+)"?',
                           (r/'plugins/email-triage/skills/email-triage/SKILL.md').read_text(encoding='utf-8')).group(1)
          rd   = re.search(r'(?m)^#\s+Email Triage Plugin v([0-9.]+)',
                           (r/'README.md').read_text(encoding='utf-8')).group(1)
          th   = re.search(r'email-triage \(v([0-9.]+)\)',
                           (r/'plugins/email-triage/skills/email-triage/scripts/triage_helpers.py'
                            ).read_text(encoding='utf-8')).group(1)
          vers = {'plugin.json(root)': pj, 'plugin.json(inner)': inn,
                  'marketplace.json': mk, 'SKILL.md': sk, 'README.md': rd,
                  'triage_helpers.py': th}
          assert len(set(vers.values())) == 1, f"versiones divergentes: {vers}"
          mm = '.'.join(pj.split('.')[:2])
          cfg = (r/'plugins/email-triage/skills/email-triage/config.yaml').read_text(encoding='utf-8')
          m = re.search(r'EMAIL TRIAGE v([0-9]+\.[0-9]+)', cfg)
          if m:
              assert m.group(1) == mm, f"config.yaml header v{m.group(1)} != v{mm}"
          # H1 del SKILL.md: derivó en el pasado (quedó en v3.4 en un plugin
          # v3.8). Ahora también es un gate — major.minor debe coincidir (#5).
          skill = (r/'plugins/email-triage/skills/email-triage/SKILL.md').read_text(encoding='utf-8')
          h1 = re.search(r'(?m)^#\s+Email Triage v([0-9]+\.[0-9]+)\s+—', skill)
          assert h1, "no se encontró el H1 '# Email Triage vX.Y —' en SKILL.md"
          assert h1.group(1) == mm, f"H1 del SKILL.md v{h1.group(1)} != v{mm}"
          print(f"OK: todo en {pj} (config + H1 SKILL en v{mm})")
          PY

      - name: Unicidad del árbol de scripts (no duplicar triage_helpers.py)
        run: |
          python3 - <<'PY'
          import pathlib
          r = pathlib.Path('.')
          canon = 'plugins/email-triage/skills/email-triage/scripts'
          bad = []
          for name in ('triage_helpers.py', 'test_triage_helpers.py'):
              hits = [str(p).replace('\\', '/') for p in r.rglob(name)
                      if '.git' not in p.parts]
              if len(hits) != 1:
                  bad.append(f"{name}: {len(hits)} copias -> {hits}")
              elif not hits[0].startswith(canon):
                  bad.append(f"{name} fuera de {canon}/ -> {hits[0]}")
          stray = r / 'plugins/email-triage/scripts'
          if stray.exists():
              bad.append(f"árbol paralelo presente: {stray} (Cowork empaquetaría el viejo)")
          assert not bad, "Duplicación del árbol de scripts:\n  " + "\n  ".join(bad)
          print(f"OK: scripts canónicos únicos en {canon}/")
          PY

      - name: Changelog del README en sincronía con la versión
        run: |
          python3 - <<'PY'
          import json, re, pathlib
          r = pathlib.Path('.')
          v = json.loads((r/'.claude-plugin/plugin.json').read_text(encoding='utf-8'))['version']
          rd = (r/'README.md').read_text(encoding='utf-8')
          # bump-version.sh mecaniza el H1 del README, pero la seccion de
          # novedades se escribe a mano y puede olvidarse (paso en v3.8.11).
          # Este gate convierte el recordatorio en mecanismo.
          assert f'## Novedades en v{v}' in rd, (
              f"README.md sin seccion '## Novedades en v{v}' — el H1 ya esta "
              f"en v{v}; anade la entrada de novedades antes de publicar")
          m = re.search(r'(?m)^## Novedades en v([0-9.]+)', rd)
          assert m and m.group(1) == v, (
              f"la primera seccion de novedades del README es v{m.group(1)}, "
              f"no v{v}: la entrada nueva va por encima de las anteriores")
          print(f"OK: changelog del README al dia (v{v})")
          PY

      - name: Fuzz de totalidad de los puntos de entrada (semilla rotativa)
        run: |
          python3 - <<'PY'
          import sys, json, random, datetime
          sys.path.insert(0, 'plugins/email-triage/skills/email-triage/scripts')
          import triage_helpers as th
          import test_triage_helpers as tt
          # Semilla derivada de la fecha: la suite local es reproducible
          # (semilla fija), el CI explora entradas nuevas cada día. La
          # invariante es la misma: total + dict serializable.
          semilla = int(datetime.date.today().strftime("%Y%m%d"))
          rng = random.Random(semilla)
          def total(fn, *a):
              try:
                  r = fn(*a)
              except Exception as e:
                  print("FALLO:", fn.__name__, type(e).__name__, repr(e)[:160])
                  print("  args=", repr(a)[:300]); sys.exit(1)
              assert isinstance(r, dict), (fn.__name__, type(r).__name__)
              json.dumps(r, ensure_ascii=False)
          N = 20000
          for _ in range(N):
              total(th.cmd_scoring_dispatch, tt._rand_json(rng),
                    tt._rand_json(rng), bool(rng.getrandbits(1)))
              total(th.cmd_montar_mover, tt._rand_json(rng))
              total(th.cmd_sanitizar, tt._rand_texto(rng),
                    rng.choice([1500, 800, 0, -3, 1]),
                    tt._rand_texto(rng), tt._rand_texto(rng))
              total(th.cmd_calibrar, tt._rand_json(rng))
          print(f"OK: fuzz de totalidad, semilla {semilla}, {N} iters x 4 entradas")
          PY
