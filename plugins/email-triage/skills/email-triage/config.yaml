# ═══════════════════════════════════════════════════════════════
# EMAIL TRIAGE v2.0 — Configuración del usuario
# ═══════════════════════════════════════════════════════════════
#
# Este archivo define quién eres, qué te importa y cómo se
# organizan tus carpetas de correo. El skill lo usa como ancla
# para evaluar cada correo contra tu perfil real.
#
# Novedades en v2.0:
# - Puntuación ponderada por keyword (alto/medio/bajo)
# - Umbral configurable para mover correos
# - Lectura del cuerpo del email (no solo asunto)
# - Lotes de hasta 50 correos
#
# ═══════════════════════════════════════════════════════════════

usuario:
  nombre: ""
  # Tu nombre. El skill lo usa para dirigirse a ti en los resúmenes.

  perfil: |
    # Describe tu rol, formación e intereses en 2-4 líneas.
    # Esto es lo que el skill usa para decidir si un correo
    # "cambiaría algo concreto para ti".

  proyectos_activos:
    - "" # ej: "Rediseño de la app móvil (Figma + React Native)"
    - "" # ej: "Blog personal en WordPress"

  idioma: "es"
  # Idioma para los resúmenes: "es", "en", "fr", "de", etc.

# ───────────────────────────────────────────────────────────────
# Proveedor de correo
# ───────────────────────────────────────────────────────────────

correo:
  proveedor: "icloud"
  # Opciones: "icloud", "gmail", "otro"
  #
  # - icloud: usa Mail.app vía AppleScript (requiere Control your Mac)
  # - gmail: usa Gmail MCP (requiere conector Gmail en Claude)
  # - otro: el skill preguntará qué conectores están disponibles

  cuenta: ""
  # Nombre de la cuenta en Mail.app o dirección de Gmail.
  # Para iCloud: nombre tal como aparece en Mail.app (ej: "iCloud")
  # Para Gmail: dirección de correo (ej: "usuario@gmail.com")

# ───────────────────────────────────────────────────────────────
# Estructura de carpetas
# ───────────────────────────────────────────────────────────────

carpetas:
  entrada: "INBOX"
  pendiente: "Leer Después"
  destino: "Leer Después/IMPORTANTES"
  historial: "Conservar"
  # historial es opcional. Se usa para calibración estadística.

# ───────────────────────────────────────────────────────────────
# Modo de interacción
# ───────────────────────────────────────────────────────────────

interaccion:
  modo: "confirmacion"
  # Opciones:
  # - "confirmacion": pregunta uno a uno antes de mover (recomendado al inicio)
  # - "lote": presenta todos y pide confirmación global
  # - "silencioso": mueve automáticamente (solo tras varias ejecuciones exitosas)

  limite_por_sesion: 50
  # Máximo de correos a procesar por ejecución (v2.0 soporta hasta 50).

  mostrar_calibracion: false
  # Si true, muestra las métricas de calibración al usuario.

# ───────────────────────────────────────────────────────────────
# Puntuación y umbrales (NUEVO en v2.0)
# ───────────────────────────────────────────────────────────────

puntuacion:
  umbral_mover: 3
  # Puntuación mínima para recomendar MOVER un correo.
  # Ajusta según tu experiencia:
  # - 2 = más permisivo (mueve más correos)
  # - 3 = equilibrado (recomendado)
  # - 5 = muy selectivo (solo lo más relevante)

  leer_cuerpo: true
  # Si true, el skill lee los primeros ~500 caracteres del cuerpo
  # del email para evaluar keywords y criterios de valor.
  # Si false, solo usa asunto y remitente (más rápido, menos preciso).
  # Si Mail.app no puede acceder al cuerpo, el skill continúa
  # en modo degradado (solo asunto/remitente) automáticamente.

# ───────────────────────────────────────────────────────────────
# Filtros y pesos
# ───────────────────────────────────────────────────────────────

filtros:
  remitentes_prioritarios: []
  # Direcciones que reciben +3 puntos automáticos.
  # Ejemplo:
  # - "newsletter@interesante.com"
  # - "jefe@empresa.com"

  remitentes_ignorar: []
  # Direcciones que se saltan completamente (puntuación -99).
  # Ejemplo:
  # - "noreply@spam.com"

  palabras_clave_boost:
  # Términos que aumentan la puntuación. Cada entrada puede tener
  # un peso: "alto" (+3), "medio" (+2), "bajo" (+1, por defecto).
  #
  # Formato con peso:
  #   - palabra: "Claude"
  #     peso: "alto"
  #
  # Formato simple (peso "bajo" por defecto):
  #   - "deadline"
  #
  # Ejemplo completo:
  #   - palabra: "breaking change"
  #     peso: "alto"
  #   - palabra: "release notes"
  #     peso: "medio"
  #   - "weekly update"
    []

  palabras_clave_penalizar:
  # Términos que restan puntuación (-2 cada uno).
  # Ejemplo:
  # - "unsubscribe"
  # - "weekly digest"
    []


