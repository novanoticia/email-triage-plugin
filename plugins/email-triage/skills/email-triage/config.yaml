# ═══════════════════════════════════════════════════════════════
# EMAIL TRIAGE v3.8 — Configuración del usuario
# ═══════════════════════════════════════════════════════════════
#
# Este archivo define quién eres, qué te importa, cómo se
# organizan tus carpetas de correo, y los criterios epistémicos
# que el skill usa para evaluar cada correo.
#
# Novedades en v3.4:
# - El config personal vive en ~/.email-triage/config.yaml (fuera del
#   repo): sobrevive a actualizaciones y no puede filtrarse a git.
#   Este archivo del repo es solo la PLANTILLA — no pongas datos aquí.
# - El comando /triage se carga desde dentro del plugin
#
# Novedades en v3.3:
# - Bloque `interaccion.rutina` para ejecuciones desde scheduled task
# - Modo silencioso con umbral: mueve solo lo claramente actionable
# - Lista separada de "candidatos dudosos" para revisión humana
# - Notificación de macOS al terminar (sonido configurable)
# - Timestamps automáticos de inicio/fin con duración total
#
# Novedades en v3.0:
# - 30 criterios epistémicos inspirados en LessWrong Sequences
# - Scoring multi-eje (decisional, epistémico, manipulación,
#   cognitivo, acción)
# - 4 tiers de routing (reply_needed, review, reading_later, archive)
# - Explicación por correo (razones positivas y negativas)
# - Telemetría y registro de correcciones del usuario
#
# Compatible con v2.0: mantiene keywords, calibración y lotes.
#
# ═══════════════════════════════════════════════════════════════

usuario:
  nombre: ""
  # ⚠️ OBLIGATORIO — Tu nombre. El skill no arrancará sin él.
  # Se usa para dirigirse a ti y para detectar menciones directas en correos.

  perfil: |
    # ⚠️ OBLIGATORIO (mínimo 10 caracteres) — Describe tu rol, formación
    # e intereses en 2-4 líneas. Esto es el ancla del triaje: sin perfil,
    # el criterio "¿cambiaría algo concreto para ti?" no tiene referencia
    # y el skill usará un criterio genérico (menos preciso).

  proyectos_activos:
    # Lista tus proyectos activos. Los correos relacionados reciben boost.
    # Si está vacía, el skill funciona pero sin contexto de proyectos.
    - "" # ej: "Rediseño de la app móvil (Figma + React Native)"
    - "" # ej: "Blog personal en WordPress"

  idioma: "es"
  # Idioma para los resúmenes: "es", "en", "fr", "de", etc.

# ───────────────────────────────────────────────────────────────
# Proveedor de correo
# ───────────────────────────────────────────────────────────────

correo:
  proveedor: "icloud"
  # ⚠️ OBLIGATORIO — Opciones: "icloud", "gmail", "otro"
  # - icloud: usa Mail.app vía AppleScript (requiere "Control your Mac")
  # - gmail: usa Gmail MCP (requiere conector Gmail activo)
  # - otro: el skill preguntará qué conectores tienes disponibles

  cuenta: ""
  # ⚠️ OBLIGATORIO — Nombre de la cuenta en Mail.app (ej: "iCloud")
  # o dirección de Gmail (ej: "miusuario@gmail.com").

# ───────────────────────────────────────────────────────────────
# Estructura de carpetas
# ───────────────────────────────────────────────────────────────

carpetas:
  entrada: "INBOX"
  pendiente: "Leer Después"
  destino: "Urgentes Claude"
  # Carpeta a la que se mueven los correos REVIEW.
  # Si no existe, el skill la creará automáticamente.

  destino_reply_needed: "INBOX"
  # Carpeta a la que se mueven los correos REPLY_NEEDED.
  # Por defecto INBOX: los correos que requieren respuesta se quedan
  # visibles en la bandeja principal.
  # Si solo puedes usar un destino, pon el mismo valor que "destino".

  destino_archive: ""
  # Carpeta a la que se mueven los correos ARCHIVE.
  # Si está vacío, el skill archiva nativamente (quita del inbox sin borrar).
  # Si se especifica (ej: "Archivo" o "Claude/Descartados"), mueve a esa carpeta.
  # Si la carpeta no existe, el skill la creará automáticamente.

  historial: "Conservar"
  # Opcional. Se usa para calibración estadística.
  # Debe contener correos que has decidido conservar manualmente.

# ───────────────────────────────────────────────────────────────
# Modo de interacción
# ───────────────────────────────────────────────────────────────

interaccion:
  modo: "confirmacion"
  # Opciones:
  # - "confirmacion": pregunta uno a uno antes de mover (recomendado al inicio)
  # - "lote": presenta todos y pide confirmación global
  # - "silencioso": mueve automáticamente (solo tras varias ejecuciones exitosas)
  # - "simulacion": dry-run, no mueve nada (alias: dry-run desde la petición)

  limite_por_sesion: 50
  mostrar_calibracion: false

  # ─── Modo rutina (NUEVO en v3.3) ─────────────────────────────
  # Cuando el skill se ejecuta desde una scheduled task / rutina
  # (el contexto incluye la etiqueta <scheduled-task>), los
  # parámetros de este bloque sobrescriben a `modo` para esa
  # ejecución concreta. Las invocaciones manuales NO se ven
  # afectadas. Ver PASO 0 y PASO 4.G del SKILL.md.
  rutina:
    activo: false
    # DESACTIVADO por defecto desde v3.4.3: una plantilla recién
    # instalada no debe mover correos de forma desatendida sin que
    # el usuario lo haya decidido. Cambia a true para que las
    # scheduled tasks usen este bloque; con false usan `modo` como
    # cualquier otra ejecución.

    modo: "silencioso"
    # Comportamiento durante la rutina. Recomendado: "silencioso".

    umbral_mover: 10
    # Score mínimo para mover automáticamente a `carpetas.destino`.
    # Por defecto = tiers.reply_needed. Subir para ser más conservador.
    # ⚠️ Nota: en rutina, los correos que en sesión manual irían a
    # `destino_reply_needed` (INBOX) también se mueven a `carpetas.destino`
    # — decisión deliberada para concentrar lo actionable en una sola
    # carpeta cuando no hay humano presente. Ver PASO 4.G del SKILL.md.

    umbral_dudoso_min: 4
    # Score mínimo para listar como "candidato dudoso".
    # Por defecto = tiers.review.

    umbral_dudoso_max: 9
    # Score máximo para "candidato dudoso" (justo por debajo de
    # umbral_mover). Los dudosos NO se mueven; quedan listados
    # en el resumen final para revisión humana posterior.

    archivar_automaticamente: false
    # Si true, mueve a `carpetas.destino_archive` los correos con score
    # ≤ tiers.archive (si destino_archive está vacío, archiva nativamente).
    # Mantener false hasta validar precisión.

    notificacion_macos: true
    # Al terminar, lanzar `display notification` con resumen breve
    # ("N movidos, M dudosos en T min"). Solo aplica en macOS.

    sonido_notificacion: "Glass"
    # Sonido del system. Otros: "Ping", "Pop", "Submarine", "Tink".

    incluir_timestamps: true
    # Marca hora de inicio (HH:MM:SS) en la primera línea de la
    # respuesta y hora de fin antes del resumen, con duración total.

# ───────────────────────────────────────────────────────────────
# Puntuación y lectura del cuerpo
# ───────────────────────────────────────────────────────────────

puntuacion:
  leer_cuerpo: true
  # Si true, lee el cuerpo: extracción cruda (4000, la fija el SKILL en PASO 1),
  # luego S0–S5 lo limpia y lo trunca a max_caracteres_cuerpo.
  # Si false, solo usa asunto y remitente (más rápido, menos preciso).

  max_caracteres_cuerpo: 1500
  # Presupuesto de caracteres del cuerpo DESPUÉS de la limpieza (v3.5):
  # el sanitizador lo recibe vía --max-chars y trunca el texto YA limpio.
  # La extracción cruda previa es de 4000 y la fija el SKILL (PASO 1).
  # Valores recomendados: 800 (rápido), 1500 (equilibrado), 2500 (profundo).
  # NO hay ningún otro tope de caracteres: los números 500/2000 de versiones
  # < v3.5 ya NO existen (QW3/F5, auditoría 2026-07-17). El control de volumen
  # tiene exactamente dos números —extracción 4000 y este presupuesto—; fuente
  # única: references/manejo-errores.md.

  max_lineas_cuerpo: 30
  # Tope de LÍNEAS del texto plano. OJO (QW3/F5): lo aplica el MODELO en modo
  # mental/veloz (orquestación); el pipeline determinista (`sanitizar`) NO lo
  # consume —no existe flag --max-lines—. El único recorte mecánico del cuerpo
  # es max_caracteres_cuerpo vía --max-chars.

# ───────────────────────────────────────────────────────────────
# Tiers y umbrales de routing (NUEVO en v3.0)
# ───────────────────────────────────────────────────────────────

tiers:
  reply_needed: 10
  # Score mínimo para tier de respuesta urgente.
  # También se activa por: pregunta directa, deadline explícito,
  # hilo donde el usuario es blocker.

  review: 4
  # Score mínimo para "vale la pena leer con atención".

  reading_later: 0
  # Score mínimo para "interesante pero no urgente".

  archive: -1
  # Todo lo que quede por debajo va a archive.

# ───────────────────────────────────────────────────────────────
# Hard rules (reglas deterministas antes del scoring epistémico)
# ───────────────────────────────────────────────────────────────

hard_rules:
  pregunta_directa_boost: 4
  deadline_explicito_boost: 4
  mencion_directa_boost: 3
  hilo_esperando_respuesta_boost: 5
  sender_bulk_penalizacion: -4
  sin_accion_sin_info_penalizacion: -5

# ───────────────────────────────────────────────────────────────
# Scoring (PASO 4) — cómo se agregan los ejes del score epistémico
# ───────────────────────────────────────────────────────────────
# modo: mental (POR DEFECTO) — el modelo agrega los 5 ejes con su juicio,
#         como hasta ahora. Máxima discrecionalidad, sin reproducibilidad
#         garantizada entre pasadas.
#       determinista — el modelo SOLO evalúa cada criterio (sí/no/alta…)
#         y delega la aritmética en triage_helpers.py (subcomando `scoring`):
#         suma por eje, clampa a los rangos de abajo, añade hard rules y
#         devuelve score+tier reproducibles. Actívalo cambiando a
#         "determinista" aquí, o pidiéndolo en el chat ("modo determinista")
#         para una sesión concreta.
scoring:
  modo: mental

  # ─── Parche v3.7 ─────────────────────────────────────────────
  cap_reply_needed_sin_accion: true
  # Si true (recomendado), REPLY_NEEDED solo se alcanza con una señal de
  # acción explícita (forzar_reply_needed: pregunta directa, deadline <=72h,
  # hilo bloqueado). Un score alto por valor/calidad NO basta — se capa a
  # REVIEW. Evita que newsletters muy interesantes acaben marcadas como
  # "exige respuesta". Ponlo en false para volver al comportamiento anterior.

  sender_bulk_atenuado_a: -1
  # Cuando un correo se evalúa con remitente_en_historial=true, la
  # penalización sender_bulk_penalizacion (-4) se atenúa hasta este valor.
  # Un remitente que conservas a mano no merece el castigo completo de
  # "remitente masivo".

  # Rangos acotados de cada eje (el script clampa la suma a estos límites).
  ejes:
    valor_decisional: [0, 10]
    calidad_epistemica: [-10, 10]
    riesgo_manipulacion: [-10, 0]
    coste_cognitivo: [-5, 0]
    presion_accion: [0, 10]

# ───────────────────────────────────────────────────────────────
# Filtros y pesos (heredados de v2.0)
# ───────────────────────────────────────────────────────────────

filtros:
  remitentes_prioritarios: []
  # Direcciones que reciben +3 puntos automáticos.

  remitentes_ignorar: []
  # Direcciones que se saltan completamente (-99).

  palabras_clave_boost:
  # Formato con peso:
  #   - palabra: "Claude"
  #     peso: "alto"
  # Formato simple (peso "bajo" por defecto):
  #   - "deadline"
    []

  palabras_clave_penalizar:
  # Términos que restan -2 cada uno.
    []

# ───────────────────────────────────────────────────────────────
# Resiliencia (NUEVO en v3.0.1)
# ───────────────────────────────────────────────────────────────

resiliencia:
  max_reintentos: 3
  # Intentos máximos para operaciones de lectura (listar, leer cuerpo).
  # No aplica a operaciones de escritura/mover (esas no se reintentan).

  sublote_con_cuerpo: 15
  # Si el lote tiene más de 30 correos con lectura de cuerpo activa,
  # procesar en sublotes de este tamaño para no saturar contexto.

  feedback_cada_n: 10
  # En lotes grandes, informar al usuario cada N correos procesados.

# ═══════════════════════════════════════════════════════════════
# CRITERIOS EPISTÉMICOS (NUEVO en v3.0)
# ═══════════════════════════════════════════════════════════════
#
# 30 criterios inspirados en racionalidad bayesiana (LessWrong
# Sequences). Cada criterio tiene:
# - weight: referencia conceptual. OJO: en modo determinista NO se usa
#   (triage_helpers lo excluye vía _META_CRIT); los puntos salen de los
#   valores (si/no/quiza). Editarlo no cambia el score determinista; solo
#   orienta al modo mental.
# - question: pregunta operativa que el modelo evalúa
# - valores posibles con sus puntuaciones
# - activo: true/false para activar/desactivar
#
# Los 12 criterios marcados como "core: true" se evalúan SIEMPRE.
# Los demás se evalúan solo cuando el contexto lo amerita.
#
# ═══════════════════════════════════════════════════════════════

criterios_epistemicos:

  # ─── GRUPO A: Criterio base ────────────────────────────────

  cambia_algo_concreto:
    eje: valor_decisional
    activo: true
    core: true
    weight: 5
    question: "¿Leer esto cambiaría algo concreto que vaya a hacer?"
    si: 5
    "no": -5

  # ─── GRUPO B: Actualización bayesiana ──────────────────────

  cambio_predicciones:
    eje: valor_decisional
    activo: true
    core: true
    weight: 4
    question: "¿Altera mis predicciones sobre hoy/esta semana/este proyecto?"
    si: 4
    "no": -3

  sorpresa_bayesiana:
    eje: calidad_epistemica
    activo: true
    core: true
    weight: 3
    question: "¿Qué tan inesperada es esta información?"
    baja: -2
    media: 1
    alta: 3

  evidencia_filtrada:
    eje: riesgo_manipulacion
    activo: true
    core: true
    weight: -3
    question: "¿Cuál es el algoritmo del remitente al enviarme esto?"
    neutral: 0
    selectivamente_persuasivo: -2
    newsletter_marketing_burocratico: -3

  forward_backward_flow:
    eje: calidad_epistemica
    activo: true
    core: true
    weight: 3
    question: "¿Explora una solución o valida una decisión ya tomada?"
    forward: 3
    mixto: 0
    backward: -2

  # ─── GRUPO C: Diseño atencional y utilidad ─────────────────

  retorno_atencional:
    eje: valor_decisional
    activo: true
    core: false
    weight: 2
    question: "¿Es buena inversión de mis próximos 2 minutos?"
    alto: 2
    medio: 0
    bajo: -2

  confusion_productiva:
    eje: calidad_epistemica
    activo: true
    core: false
    weight: 4
    question: "¿Revela una discrepancia importante entre lo esperado y lo real?"
    si: 4
    "no": 0

  impacto_causal_real:
    eje: presion_accion
    activo: true
    core: true
    weight: 4
    question: "Si actúo por este correo, ¿cuánto cambia realmente el resultado?"
    alto: 4
    medio: 2
    bajo: 0

  ruido_social:
    eje: calidad_epistemica
    activo: true
    core: false
    weight: -3
    question: "¿Es señal real o ritual social/burocrático?"
    senal_real: 0
    mixto: -1
    ritual: -3

  abre_opciones:
    eje: valor_decisional
    activo: true
    core: false
    weight: 3
    question: "¿Abre una opción valiosa futura que antes no tenía?"
    si: 3
    "no": 0

  distancia_inferencial:
    eje: coste_cognitivo
    activo: true
    core: false
    weight: -2
    question: "¿Cuánto trabajo mental me cuesta entenderlo de verdad?"
    baja: 0
    media: -1
    alta: -2

  agente_estrategico:
    eje: riesgo_manipulacion
    activo: true
    core: false
    weight: -3
    question: "¿El remitente optimiza para verdad o para influirme?"
    "no": 0
    quiza: -1
    si: -3

  densidad_informativa:
    eje: calidad_epistemica
    activo: true
    core: false
    weight: -2
    question: "¿Cuánta información nueva por línea aporta?"
    alta: 1
    media: 0
    baja: -2

  urgencia_real_vs_fabricada:
    eje: presion_accion
    activo: true
    core: true
    weight: 3
    question: "¿La urgencia está respaldada por consecuencias verificables?"
    fabricada: -3
    neutral: 0
    real: 3

  relevancia_longitudinal:
    eje: valor_decisional
    activo: true
    core: false
    weight: 4
    question: "¿Mi yo de dentro de un mes agradecerá haber leído esto?"
    si: 4
    quiza: 1
    "no": 0

  # ─── GRUPO D: Anti-sesgo y calidad argumentativa ───────────

  motivated_stopping:
    eje: calidad_epistemica
    activo: true
    core: false
    weight: -2
    question: "¿Me empuja a cerrar demasiado pronto una cuestión?"
    si: -2
    "no": 0

  motivated_continuation:
    eje: calidad_epistemica
    activo: true
    core: false
    weight: -2
    question: "¿Prolonga artificialmente una decisión que ya podría cerrarse?"
    si: -2
    "no": 0

  true_rejection:
    eje: calidad_epistemica
    activo: true
    core: false
    weight: 2
    question: "¿La objeción que aparece es sustantiva o solo excusa elegante?"
    superficial: -2
    mixta: 0
    real: 2

  third_alternative:
    eje: valor_decisional
    activo: true
    core: false
    weight: 3
    question: "¿Detecta una tercera alternativa útil más allá de A o B?"
    si: 3
    "no": 0

  privileging_the_hypothesis:
    eje: calidad_epistemica
    activo: true
    core: false
    weight: -3
    question: "¿Eleva una hipótesis sin evidencia suficiente?"
    si: -3
    "no": 0

  proper_humility:
    eje: calidad_epistemica
    activo: true
    core: false
    weight: 3
    question: "¿La duda viene con mitigación/verificación concreta?"
    duda_vaga: -2
    neutral: 0
    humildad_operativa: 3

  positive_bias:
    eje: calidad_epistemica
    activo: true
    core: false
    weight: -2
    question: "¿Solo aporta ejemplos favorables sin enfrentar objeciones?"
    si: -2
    "no": 0

  argument_screens_off_authority:
    eje: calidad_epistemica
    activo: true
    core: true
    weight: 3
    question: "¿Trae evidencia/argumento o solo autoridad/rango/cargo?"
    solo_autoridad: -2
    mixto: 0
    argumento_fuerte: 3

  hug_the_query:
    eje: valor_decisional
    activo: true
    core: true
    weight: 4
    question: "¿Está pegado a la decisión real o es contexto tangencial?"
    directo: 4
    adyacente: 1
    tangencial: -2

  semantic_stopsigns:
    eje: calidad_epistemica
    activo: true
    core: true
    weight: -3
    question: "¿Usa jerga o etiquetas para cerrar la investigación?"
    si: -3
    "no": 0

  fake_justification:
    eje: calidad_epistemica
    activo: true
    core: false
    weight: -3
    question: "¿La conclusión parece anterior al razonamiento?"
    si: -3
    "no": 0

  fake_optimization_criteria:
    eje: riesgo_manipulacion
    activo: true
    core: false
    weight: -2
    question: "¿El criterio de decisión parece oportunista?"
    si: -2
    "no": 0

  entangled_truths:
    eje: calidad_epistemica
    activo: true
    core: true
    weight: 3
    question: "¿Está anclado a hechos verificables (tickets, fechas, métricas, personas)?"
    alto: 3
    medio: 1
    flotante: -2

  cached_thought:
    eje: calidad_epistemica
    activo: true
    core: false
    weight: -2
    question: "¿Es pensamiento original o plantilla repetida?"
    original: 1
    mixto: 0
    enlatado: -2

  absence_of_expected_evidence:
    eje: calidad_epistemica
    activo: true
    core: true
    weight: -3
    question: "¿Falta una pieza que debería estar si esto fuese tan importante?"
    si: -3
    "no": 0

# ───────────────────────────────────────────────────────────────
# Explicación (NUEVO en v3.0)
# ───────────────────────────────────────────────────────────────

explicacion:
  razones_positivas: 3
  # Cuántas razones positivas incluir en la explicación.

  razones_negativas: 3
  # Cuántas razones negativas incluir.

  incluir_rationale: true
  # Si true, incluye una frase en español llano explicando la decisión.

# ───────────────────────────────────────────────────────────────
# Telemetría y aprendizaje (NUEVO en v3.0)
# ───────────────────────────────────────────────────────────────

telemetria:
  guardar_vector: true
  # Guarda el feature vector por correo (señales extraídas).

  guardar_score: true
  # Guarda la puntuación final y subpuntuaciones.

  guardar_explicacion: true
  # Guarda el rationale generado.

  guardar_correccion: true
  # Registra cuando el usuario corrige un tier.

  exportar_mal_clasificados: true
  # Marca los correos donde el usuario corrigió para análisis.


# ═══════════════════════════════════════════════════════════════
# EJEMPLOS DE PERFILES
# ═══════════════════════════════════════════════════════════════
#
# EJEMPLO A — Investigador / divulgador:
#
#   nombre: "Ana"
#   perfil: |
#     Investigadora y escritora con formación en biología molecular.
#     Intereses en comunicación científica, ética de la IA y políticas
#     de salud pública. Colabora con varias revistas de divulgación.
#   proyectos_activos:
#     - "ciencia-cercana.org — blog de divulgación científica"
#     - "Informe anual sobre sesgos en ensayos clínicos (editorial)"
#
# EJEMPLO B — Desarrolladora frontend:
#
#   nombre: "Laura"
#   perfil: |
#     Desarrolladora frontend senior en empresa SaaS B2B.
#     Stack principal: React, TypeScript, Tailwind.
#
# ═══════════════════════════════════════════════════════════════
